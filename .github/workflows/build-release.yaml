name: Milk-V Duo - Build Release

on:
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Prerelease'
        type: boolean
        required: true
        default: true
      compile:
        description: 'Compile from source'
        type: boolean
        required: true
        default: false
      tag_name:
        description: 'Tag (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.compile }}

      - name: Build in container
        uses: addnab/docker-run-action@v3
        with:
          image: ubuntu:noble
          options: --privileged -v ${{ github.workspace }}:/project -w /project
          run: |
            apt-get update -y
            apt-get install -y git
            git clone https://github.com/pengutronix/genimage.git
            ./scripts/setup.sh
            [ "${{ inputs.compile }}" = "true" ] && ./scripts/compile.sh
            ./build.sh duo256m
            ./build.sh duos
            ./build.sh duos-wifi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || format('build-{0}', github.run_id) }}
          files: |
            images/ubuntu-noble-milkv-duo256m.img
            images/ubuntu-noble-milkv-duos.img
            images/ubuntu-noble-milkv-duos-wifi.img
          prerelease: ${{ inputs.is_prerelease }}
          name: "${{ inputs.tag_name || github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
