image ubuntu-milkv.img {
  hdimage {}
  partition boot {
    partition-type = 0xC
    image = "boot.vfat"
    size = 128M
  }

  partition swap {
    partition-type = 0x82
    image = "swap.img"
  }

  partition rootfs {
    partition-type = 0x83
    bootable = "true"
    image = "rootfs.ext4"
  }
}

image boot.vfat {
  vfat {
    files = { "./fip.bin", "./boot.sd" }
  }
  size = 128M
}

image rootfs.ext4 {
  ext4 {
    label = "rootfs"
    use-mke2fs = "true"
  }
  size = 1G
  mountpoint = "/"
}